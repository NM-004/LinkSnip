name: LinkSnip CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: linksnip
  DOCKER_HUB_REPO: ${{ secrets.DOCKER_HUB_USERNAME }}/linksnip

jobs:
  # ── Stage 1: Test ────────────────────────────────────────────────────────────
  test:
    name:  Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/

  # ── Stage 2: Build & Push Docker Image ──────────────────────────────────────
  build:
    name:  Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_REPO }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Deploy to Kubernetes ───────────────────────────────────────────
  deploy:
    name:  Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: linksnip-cluster

      - name: Load Docker image into kind
        run: |
          # Pull the image we just built
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/linksnip:${{ github.run_number }}
          # Load it into kind cluster
          kind load docker-image ${{ secrets.DOCKER_HUB_USERNAME }}/linksnip:${{ github.run_number }} --name linksnip-cluster

      - name: Update image in deployment
        run: |
          sed -i "s|image: linksnip:v2|image: ${{ secrets.DOCKER_HUB_USERNAME }}/linksnip:${{ github.run_number }}|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/redis-pvc.yaml
          kubectl apply -f k8s/redis-deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for Redis to be ready
        run: |
          kubectl rollout status deployment/linksnip-redis -n linksnip --timeout=180s || {
            echo "Redis rollout failed. Checking PVC and Redis status..."
            kubectl get pvc -n linksnip
            kubectl describe pvc redis-pvc -n linksnip || true
            kubectl get pods -n linksnip -l app=linksnip,component=redis
            kubectl describe pods -n linksnip -l app=linksnip,component=redis
            kubectl logs -n linksnip -l app=linksnip,component=redis --tail=100 || true
            exit 1
          }
      - name: Debug - Check pod status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n linksnip
          echo ""
          echo "=== Pod Details ==="
          kubectl describe pods -n linksnip
          echo ""
          echo "=== Pod Logs ==="
          kubectl logs -n linksnip -l app=linksnip,component=web --tail=50 || true
          echo ""
          echo "=== Events ==="
          kubectl get events -n linksnip --sort-by='.lastTimestamp'
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/linksnip-app -n linksnip --timeout=300s || {
            echo "Rollout failed. Checking pod status..."
            kubectl get pods -n linksnip
            kubectl describe pods -n linksnip
            kubectl logs -n linksnip -l app=linksnip,component=web --tail=100 || true
            exit 1
          }

      - name: Verify deployment
        run: |
          kubectl get pods -n linksnip
          kubectl get services -n linksnip

  # ── Stage 4: Deploy to EC2 ───────────────────────────────────────────
  deploy_ec2:
    name:  Deploy to EC2
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Get AWS Account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Ensure S3 Bucket for Terraform State
        run: |
          BUCKET_NAME="linksnip-tfstate-ap-south-1-${{ steps.account.outputs.id }}"
          aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null || \
          aws s3api create-bucket --bucket "$BUCKET_NAME" --region ap-south-1 \
            --create-bucket-configuration LocationConstraint=ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Fetch GitHub Actions IP
        id: ip
        run: echo "runner_ip=$(curl -s ifconfig.me)" >> $GITHUB_OUTPUT

      - name: Set up SSH Key for Terraform
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_rsa_tmp
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          tr -d '\r' < ~/.ssh/id_rsa_tmp > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          rm -f ~/.ssh/id_rsa_tmp
          # Generate the public key from the private key so Terraform can use it
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          BUCKET_NAME="linksnip-tfstate-ap-south-1-${{ steps.account.outputs.id }}"
          terraform init -backend-config="bucket=${BUCKET_NAME}" -backend-config="region=ap-south-1"

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -var="your_ip=${{ steps.ip.outputs.runner_ip }}/32"

      - name: Get EC2 IP Address
        id: tf_out
        working-directory: ./terraform
        run: echo "instance_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT

      - name: Trust EC2 SSH Host
        run: |
          EC2_IP="${{ steps.tf_out.outputs.instance_ip }}"
          echo "Waiting for SSH to be ready on $EC2_IP..."
          for i in $(seq 1 36); do
            if ssh-keyscan -H "$EC2_IP" >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "SSH is ready!"
              exit 0
            fi
            echo "Attempt $i/36 - SSH not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: SSH never became ready on $EC2_IP after 3 minutes."
          exit 1

      - name: Setup Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Run Ansible Playbook
        working-directory: ./ansible
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          # Write dynamic inventory
          echo "[linksnip]" > dynamic_inventory.ini
          echo "linksnip-server ansible_host=${{ steps.tf_out.outputs.instance_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa" >> dynamic_inventory.ini
          echo "[linksnip:vars]" >> dynamic_inventory.ini
          echo "ansible_python_interpreter=/usr/bin/python3" >> dynamic_inventory.ini
          
          # Run deployment
          ansible-playbook -i dynamic_inventory.ini deploy.yml