version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linksnip-app
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BASE_URL=http://localhost:5000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - linksnip-net

  redis:
    image: redis:7-alpine
    container_name: linksnip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - linksnip-net

volumes:
  redis-data:

networks:
  linksnip-net:
    driver: bridge
