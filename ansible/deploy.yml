---
- name: Deploy LinkSnip Application
  hosts: linksnip
  become: yes

  vars:
    app_dir: /opt/linksnip
    docker_hub_username: "{{ lookup('env', 'DOCKER_HUB_USERNAME') | default('YOUR_USERNAME', true) }}"
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"

  tasks:
    # ── System Setup ────────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - python3-pip
        state: present

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
          tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker and Docker Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # ── App Deployment ──────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Create docker-compose.yml
      copy:
        content: |
          version: "3.9"
          services:
            app:
              image: ${DOCKER_IMAGE}
              container_name: linksnip-app
              ports:
                - "5000:5000"
              environment:
                - REDIS_HOST=redis
                - REDIS_PORT=6379
                - BASE_URL=${BASE_URL}
              depends_on:
                redis:
                  condition: service_healthy
              restart: unless-stopped
              networks:
                - linksnip-net
            redis:
              image: redis:7-alpine
              container_name: linksnip-redis
              ports:
                - "6379:6379"
              volumes:
                - redis-data:/data
              command: redis-server --appendonly yes
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 5s
                retries: 5
              restart: unless-stopped
              networks:
                - linksnip-net
          volumes:
            redis-data:
          networks:
            linksnip-net:
              driver: bridge
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Create .env file
      copy:
        content: |
          REDIS_HOST=redis
          REDIS_PORT=6379
          BASE_URL=http://{{ ansible_host }}
          DOCKER_IMAGE={{ docker_hub_username }}/linksnip:{{ image_tag }}
        dest: "{{ app_dir }}/.env"
        owner: ubuntu
        mode: "0600"

    - name: Pull latest Docker images
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        pull: always
      become_user: ubuntu

    - name: Start application with docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
      become_user: ubuntu

    # ── Health Check ────────────────────────────────────────────────────────
    - name: Wait for app to be healthy
      uri:
        url: "http://localhost:5000/health"
        status_code: 200
      register: health_check
      retries: 10
      delay: 5
      until: health_check.status == 200

    - name: Print deployment success
      debug:
        msg: "✅ LinkSnip deployed successfully at http://{{ ansible_host }}:5000"
